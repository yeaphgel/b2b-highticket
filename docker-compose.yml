version: '3.8'

services:
  # Dashboard API 服务
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clover-dashboard
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DASHBOARD_PORT=3000
      - ARK_API_KEY=${ARK_API_KEY}
      - DOUBAO_EMBEDDING_MODEL=${DOUBAO_EMBEDDING_MODEL:-doubao-embedding-large}
      - DEFAULT_LANGUAGE=${DEFAULT_LANGUAGE:-zh-Hans}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - clover-network
    restart: unless-stopped
    command: node scripts/dashboard-api.js
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # 定时调度器
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clover-scheduler
    environment:
      - NODE_ENV=production
      - ARK_API_KEY=${ARK_API_KEY}
      - DINGTALK_WEBHOOK=${DINGTALK_WEBHOOK}
      - FEISHU_WEBHOOK=${FEISHU_WEBHOOK}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - clover-network
    restart: unless-stopped
    command: node scripts/scheduler.js
    depends_on:
      dashboard:
        condition: service_healthy

  # Hermes 集成服务
  hermes:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clover-hermes
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - HERMES_PORT=3001
      - HERMES_API_KEY=${HERMES_API_KEY}
      - HERMES_SECRET=${HERMES_SECRET}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - clover-network
    restart: unless-stopped
    command: node scripts/hermes-integration.js --listen
    depends_on:
      dashboard:
        condition: service_healthy

  # Webhook 处理器
  webhook:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clover-webhook
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - WEBHOOK_PORT=3002
      - OPENCLAW_SECRET=${OPENCLAW_SECRET}
      - CALENDAR_SECRET=${CALENDAR_SECRET}
      - EMAIL_SECRET=${EMAIL_SECRET}
      - SALESFORCE_SECRET=${SALESFORCE_SECRET}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - clover-network
    restart: unless-stopped
    command: node scripts/webhook-handler.js
    depends_on:
      dashboard:
        condition: service_healthy

  # 可选: Nginx 反向代理和静态文件服务
  nginx:
    image: nginx:alpine
    container_name: clover-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - clover-network
    restart: unless-stopped
    depends_on:
      - dashboard
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  clover-network:
    driver: bridge

volumes:
  clover-data:
    driver: local
