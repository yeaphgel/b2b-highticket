<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clover A-sales 销冠教练系统</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
</head>
<body>
  <div class="container">
    <!-- 顶部导航 -->
    <header class="header">
      <div class="header-content">
        <h1 class="logo">🎮 Clover A-sales 销冠教练</h1>
        <div class="header-controls">
          <input type="text" id="userIdInput" placeholder="输入用户ID" class="user-input">
          <button id="loadBtn" class="btn btn-primary">加载数据</button>
          <select id="langSelect" class="lang-select">
            <option value="zh-Hans">简体中文</option>
            <option value="zh-Hant">繁體中文</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
            <option value="fr">Français</option>
          </select>
        </div>
      </div>
    </header>

    <!-- 主要内容 -->
    <main class="main-content">
      <!-- 仪表盘部分 -->
      <div class="dashboard-section">
        <h2 class="section-title">📊 仪表盘</h2>

        <!-- 用户基本信息卡 -->
        <div class="card user-card">
          <div class="card-header">
            <h3 id="levelTitle" class="level-title">销售新人</h3>
            <div class="level-badge" id="levelBadge">L1</div>
          </div>
          <div class="user-stats">
            <div class="stat">
              <span class="stat-label">总分</span>
              <span class="stat-value" id="userScore">0</span>
            </div>
            <div class="stat">
              <span class="stat-label">等级</span>
              <span class="stat-value" id="userLevel">1</span>
            </div>
            <div class="stat">
              <span class="stat-label">积分</span>
              <span class="stat-value" id="userPoints">0</span>
            </div>
            <div class="stat">
              <span class="stat-label">通话数</span>
              <span class="stat-value" id="callCount">0</span>
            </div>
            <div class="stat">
              <span class="stat-label">徽章</span>
              <span class="stat-value" id="badgeCount">0</span>
            </div>
          </div>
        </div>

        <!-- 十维度雷达图 -->
        <div class="card chart-card">
          <h3 class="card-title">十维度评估</h3>
          <div class="chart-container">
            <canvas id="radarChart"></canvas>
          </div>
          <div class="dimension-list">
            <div id="dimensionDetails"></div>
          </div>
        </div>
      </div>

      <!-- 排行榜部分 -->
      <div class="leaderboard-section">
        <h2 class="section-title">🏆 排行榜</h2>

        <div class="tabs">
          <button class="tab-btn active" data-tab="weekly">周排行</button>
          <button class="tab-btn" data-tab="monthly">月排行</button>
        </div>

        <div class="card leaderboard-card">
          <table class="leaderboard-table" id="leaderboardTable">
            <thead>
              <tr>
                <th>排名</th>
                <th>用户</th>
                <th>等级</th>
                <th>平均分</th>
                <th>积分</th>
              </tr>
            </thead>
            <tbody id="leaderboardBody">
            </tbody>
          </table>
        </div>
      </div>

      <!-- GROW教练部分 -->
      <div class="coaching-section">
        <h2 class="section-title">🎯 GROW教练建议</h2>

        <div class="card grow-card">
          <div class="grow-step">
            <h4>📌 目标 (Goal)</h4>
            <div id="goalContent" class="grow-content"></div>
          </div>

          <div class="grow-step">
            <h4>🔍 现状 (Reality)</h4>
            <div id="realityContent" class="grow-content"></div>
          </div>

          <div class="grow-step">
            <h4>💡 选项 (Options)</h4>
            <div id="optionsContent" class="grow-content"></div>
          </div>

          <div class="grow-step">
            <h4>✅ 行动 (Way Forward)</h4>
            <div id="wayForwardContent" class="grow-content"></div>
          </div>
        </div>

        <!-- 教练问题 -->
        <div class="card questions-card">
          <h3 class="card-title">🤔 本周重点问题</h3>
          <div id="coachingQuestions" class="questions-list"></div>
        </div>
      </div>

      <!-- 挑战进度部分 -->
      <div class="challenges-section">
        <h2 class="section-title">🚀 挑战进度</h2>

        <div class="card challenges-card">
          <h3 class="card-title">本月挑战</h3>
          <div id="challengesList" class="challenges-list"></div>
        </div>
      </div>
    </main>

    <!-- 底部 -->
    <footer class="footer">
      <p>Clover A-sales 销冠教练系统 v1.0 | 联系方式: yeaphgel@gmail.com |
        <a href="https://x.com/yeaphgel" target="_blank">@yeaphgel</a></p>
    </footer>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/api.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
